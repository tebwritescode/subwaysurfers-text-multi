name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.dockerignore'
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/subwaysurfers-text20
  DOCKERHUB_IMAGE: ${{ secrets.DOCKER_USERNAME }}/subwaysurfers-text20

concurrency:
  group: docker-build
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract version from version.py
      id: version
      run: |
        VERSION=$(python -c "exec(open('version.py').read()); print(__version__)")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Detected version: $VERSION"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # GHCR always works using the built-in GITHUB_TOKEN (no extra secrets).
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Docker Hub is optional: only used when DOCKER_USERNAME/DOCKER_PASSWORD are set.
    - name: Check Docker Hub credentials
      id: dockerhub
      run: |
        if [ -n "${{ secrets.DOCKER_USERNAME }}" ] && [ -n "${{ secrets.DOCKER_PASSWORD }}" ]; then
          echo "enabled=true" >> $GITHUB_OUTPUT
        else
          echo "enabled=false" >> $GITHUB_OUTPUT
          echo "::warning::Docker Hub secrets not set; publishing to GHCR only."
        fi

    # Non-fatal: a missing/invalid Docker Hub secret must never fail the build
    # (it only means we publish to GHCR alone).
    - name: Log in to Docker Hub
      id: dockerhub_login
      if: steps.dockerhub.outputs.enabled == 'true'
      continue-on-error: true
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Compute image tags
      id: tags
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        GHCR="${{ env.GHCR_IMAGE }}"
        TAGS="${GHCR}:v${VERSION},${GHCR}:latest"
        if [ "${{ steps.dockerhub_login.outcome }}" = "success" ]; then
          DH="${{ env.DOCKERHUB_IMAGE }}"
          TAGS="${TAGS},${DH}:v${VERSION},${DH}:latest"
        else
          echo "::warning::Docker Hub login unavailable; publishing to GHCR only."
        fi
        echo "tags=${TAGS}" >> $GITHUB_OUTPUT
        echo "Publishing tags: ${TAGS}"

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ steps.version.outputs.version }}
